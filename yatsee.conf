# Example configuration for YATSEE — copy and rename this to `yatsee.toml`
# ./yatsee.toml
#
# ==========================================
#  YATSEE GLOBAL & ENTITY CONFIGURATION
# ==========================================

[system]
root_data_dir = "./data"
log_level = "INFO"        # DEBUG, INFO, WARNING, ERROR
log_format = "%(asctime)s %(levelname)s %(name)s: %(message)s"

# Security hardening for provider targets.
# Keep these false in the published example.
llm_allow_remote = false
llm_allow_insecure_http = false
llm_allow_custom_executable = false

llm_provider = "ollama"
llm_provider_url = "http://localhost:11434"
llm_api_key = ""

# Optional reference pricing for estimated API-equivalent cost reporting,
# even when generation runs locally.
show_pricing = true
pricing_provider = "openai"
pricing_model = "gpt-5.4"

# Default models.
default_summarization_model = "mistral:latest"
default_transcription_model = "small"
default_sentence_model = "en_core_web_sm" # spaCy
default_embedding_model = "BAAI/bge-small-en-v1.5"

# Default media paths for entities.
#
# YATSEE core does not fetch provider media. Put compatible audio/video files
# here manually, via recorder output, upload workflow, or external acquisition tooling.
#
# Absolute paths are used as-is:
#   input_dir = "/mnt/media/example_county_board"
#
# Relative paths are resolved below each entity's data_path:
#   input_dir = "downloads" -> data/<entity>/downloads/
[media]
input_dir = "downloads"

# Optional. Omit this unless you want normalized audio somewhere other than:
#   data/<entity>/audio/
# audio_dir = "audio"

# Model-specific settings.
# Key = actual model name used at runtime.
# append_dir = folder name automatically appended to base data path for this model's outputs.
# max_tokens = default chunk size in tokens for summarization; should be below num_ctx.
# num_ctx = maximum context window supported by the model.
[models]
"mistral:latest" = { append_dir = "summary_mistral", max_tokens = 3500, num_ctx = 32768 }
"mistral-nemo:latest" = { append_dir = "summary_nemo", max_tokens = 12500, num_ctx = 32768 }
"llama3:latest" = { append_dir = "summary_llama3", max_tokens = 3500, num_ctx = 8192 }
"gemma:2b" = { append_dir = "summary_gemma2b", max_tokens = 3000, num_ctx = 8192 }
"qwen2.5:7b-instruct-q4_k_m" = { append_dir = "summary_qwen25", max_tokens = 12500, num_ctx = 32768 }

# --- Defined Entities ---
#
# Entities identify recurring processing targets. They do not define provider
# acquisition settings. Place raw media under the entity's configured media
# input directory, usually:
#
#   data/<entity>/downloads/
#
# Then run:
#
#   yatsee audio format -e <entity>
#
# External acquisition/import tools may write media into that directory, but
# provider-specific source configuration does not belong in core YATSEE config.

# Example entity configuration for a civic council.
# [entities.us_ca_example_city_council]
# display_name = "Example City Council"
# base = "country.US.state.CA."
# entity = "us_ca_example_city_council"

# Example entity configuration for a recurring media/channel-style source.
# [entities.example_media_channel]
# display_name = "Example Media Channel"
# base = "media.channel."
# entity = "example_media_channel"